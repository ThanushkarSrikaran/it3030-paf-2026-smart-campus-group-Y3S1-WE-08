<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="topBlue" x1="100" y1="8" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#88b8f8"/>
      <stop offset="100%" stop-color="#4060d8"/>
    </linearGradient>
    <linearGradient id="bottomGrad" x1="8" y1="100" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a52c8"/>
      <stop offset="50%" stop-color="#c82880"/>
      <stop offset="100%" stop-color="#3a52c8"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="8" y1="100" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4060d8"/>
      <stop offset="100%" stop-color="#5570e0"/>
    </linearGradient>
  </defs>

  <!-- Top cap piece -->
  <polygon points="100,8 136,44 100,52 64,44" fill="url(#topBlue)"/>

  <!-- Upper-left blue block -->
  <polygon points="64,44 100,52 100,92 8,92 8,100 64,100" fill="url(#topBlue)"/>
  <!-- Trim to diamond -->
  <polygon points="8,100 64,44 64,100" fill="url(#topBlue)"/>

  <!-- Upper-right blue block -->
  <polygon points="100,52 136,44 136,100 192,100 192,92 100,92" fill="url(#topBlue)"/>
  <polygon points="192,100 136,44 136,100" fill="url(#topBlue)"/>

  <!-- Pink left accent square -->
  <polygon points="8,100 42,66 42,100" fill="#cc2878"/>
  <rect x="8" y="66" width="34" height="34" fill="#cc2878"/>

  <!-- Pink right accent square -->
  <polygon points="192,100 158,66 158,100" fill="#cc2878"/>
  <rect x="158" y="66" width="34" height="34" fill="#cc2878"/>

  <!-- Bottom V chevron -->
  <polygon points="8,104 76,104 100,160 124,104 192,104 100,192" fill="url(#bottomGrad)"/>

  <!-- White separator lines -->
  <line x1="100" y1="8" x2="136" y2="44" stroke="white" stroke-width="4"/>
  <line x1="136" y1="44" x2="192" y2="100" stroke="white" stroke-width="4"/>
  <line x1="192" y1="100" x2="100" y2="192" stroke="white" stroke-width="4"/>
  <line x1="100" y1="192" x2="8" y2="100" stroke="white" stroke-width="4"/>
  <line x1="8" y1="100" x2="64" y2="44" stroke="white" stroke-width="4"/>
  <line x1="64" y1="44" x2="100" y2="8" stroke="white" stroke-width="4"/>
  <line x1="64" y1="44" x2="136" y2="44" stroke="white" stroke-width="4"/>
  <line x1="42" y1="66" x2="158" y2="66" stroke="white" stroke-width="4"/>
  <line x1="8" y1="100" x2="192" y2="100" stroke="white" stroke-width="4"/>
  <line x1="100" y1="52" x2="100" y2="100" stroke="white" stroke-width="4"/>
  <line x1="42" y1="66" x2="42" y2="104" stroke="white" stroke-width="4"/>
  <line x1="158" y1="66" x2="158" y2="104" stroke="white" stroke-width="4"/>
</svg>
